<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style1.css">
<title>PocketWise - Smart Finance</title>

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a; 
  color: white;
  margin: 0;
}

.app {
    text-align: center;
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
    text-align: center;
  background: #1e293b;
  padding: 15px;
  margin: 12px 0;
  border-radius: 14px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}
input{
    width: 98%;
}


button {
    margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 6px;
  border-bottom: 1px solid #334155;
}


progress {
  width: 100%;
  height: 10px;
}

.insight {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="app">

  <!-- App Title -->
  <h1>PocketWise</h1>
  <p>Your money, simplified</p>

  <!-- Dashboard Section -->
  <div class="card">
    <h2>Balance</h2>
    <h1 id="balance">₹0</h1>
    <p id="mood"> Good</p>
  </div>

  <!-- Add Income Section -->
  <div class="card">
    <h3>Add Income</h3>
    <input type="number" id="income" placeholder="Enter income" />
    <button onclick="addIncome()">Add Income</button>
  </div>

  <!-- Add Expense Section -->
  <div class="card">
    <h3>Add Expense</h3>
    <input type="number" id="amount" placeholder="Enter expense" />
    <select id="category">
      <option>Food</option>
      <option>Travel</option>
      <option>Rent</option>
      <option>Shopping</option>
    </select>
    <button onclick="addExpense()">Add Expense</button>
  </div>

  <!-- Transactions Section -->
  <div class="card">
    <h3>Transactions</h3>
    <ul id="list"></ul>
  </div>

  <!-- Goal Section -->
  <div class="card">
    <h3>Goal</h3>
    <p>Target: ₹50,000</p>

    <!-- Show saved and remaining money -->
    <p>Saved: ₹<span id="saved">0</span></p>
    <p>Remaining: ₹<span id="remaining">50000</span></p>

    <!-- Progress bar -->
    <progress id="progress" value="0" max="50000"></progress>

    <!-- Percentage text -->
    <p id="percent">0%</p>

    <!-- Message based on progress -->
    <p id="goalMsg">Start saving!</p>
  </div>

  <!-- Insights Section -->
  <div class="card">
    <h3>Money Health</h3>
    <div id="insights" class="insight">Start tracking to see insights</div>
  </div>

</div>

<script>

// -------------------- VARIABLES --------------------

// Available Money
let balance = 0;

// Goal target
let goal = 50000;

// Total money used towards goal
let saved = 0;

// Store expenses by category (Food, Travel, etc.)
let expenses = {};


// -------------------- ADD INCOME --------------------
function addIncome() {

  // Get value from input box
  let income = document.getElementById("income").value;

  // Check if valid number
  if (income <= 0) {
    alert("Enter valid income");
    return;
  }

  // Convert string to number
  income = parseInt(income);

  // Add income to balance
  balance += income;

  // Update UI
  updateUI();

  // Clear input field
  document.getElementById("income").value = "";
}


// -------------------- ADD EXPENSE --------------------
function addExpense() {

  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;

  // Check valid input
  if (amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  amount = parseInt(amount);

  // Prevent negative balance
  if (amount > balance) {
    alert(" Not enough balance!");
    return;
  }

  // Reduce balance
  balance -= amount;

  // Add to goal tracking
  saved += amount;

  // Store expense category-wise
  expenses[category] = (expenses[category] || 0) + amount;

  // Add transaction to list
  let li = document.createElement("li");
  li.innerText = `₹${amount} - ${category}`;
  document.getElementById("list").appendChild(li);

  // Update UI
  updateUI();

  // Clear input
  document.getElementById("amount").value = "";
}


// -------------------- UPDATE UI --------------------
function updateUI() {

  // Update balance text
  document.getElementById("balance").innerText = "₹" + balance;

  // Update mood based on balance
  let mood = document.getElementById("mood");

  if (balance < 5000) {
    mood.innerText = " Low balance";
  } else if (balance < 20000) {
    mood.innerText = " Manage carefully";
  } else {
    mood.innerText = " Good";
  }

  // -------- GOAL SECTION --------

  document.getElementById("saved").innerText = saved;
  document.getElementById("remaining").innerText = goal - saved;

  let percent = Math.floor((saved / goal) * 100);
  document.getElementById("percent").innerText = percent + "%";

  document.getElementById("progress").value = saved;

  let msg = document.getElementById("goalMsg");

  if (percent < 30) {
    msg.innerText = " Save more to reach your goal";
  } else if (percent < 70) {
    msg.innerText = " Good progress";
  } else {
    msg.innerText = "🎉 Almost there!";
  }

  // -------- INSIGHTS SECTION --------

  let totalExpense = Object.values(expenses).reduce((a, b) => a + b, 0);

  if (totalExpense === 0) {
    document.getElementById("insights").innerText =
      "Start tracking to see insights";
    return;
  }

  // Find highest spending category
  let topCategory = Object.keys(expenses).reduce((a, b) =>
    expenses[a] > expenses[b] ? a : b
  );

  let percentSpent = Math.floor(
    (totalExpense / (totalExpense + balance)) * 100
  );

  let text = "";

  // Show total spending
  text += ` Total spent: ₹${totalExpense}\n`;

  // Show top category
  text += ` Top category: ${topCategory}\n`;

  // Behavior analysis
  if (percentSpent > 70) {
    text += " You are spending too much.\n";
  } else if (percentSpent > 40) {
    text += " Your spending is balanced.\n";
  } else {
    text += " You are saving well.\n";
  }

  // Suggest improvement
  if (expenses[topCategory] > 2000) {
    text += ` Try reducing ${topCategory} expenses.`;
  }

  document.getElementById("insights").innerText = text;
}

</script>

</body>
</html>
